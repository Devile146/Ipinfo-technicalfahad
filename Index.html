<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Location Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Card - with subtle neon border */
        .main-card {
            max-width: 600px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 40px 32px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.1), 0 20px 35px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.3s ease;
        }

        .main-card:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        /* Title */
        h2 {
            text-align: center;
            font-size: 30px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        /* IP Input Section - Separate Bar */
        .search-section {
            margin-bottom: 30px;
        }

        .ip-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 16px;
            font-weight: 450;
            color: #fff;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 16px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        /* Blank / Minimal Button */
        .locate-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            box-shadow: 0 0 14px rgba(0, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Result Container - Neon Line on Each Info */
        .result {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        /* Individual Info Box */
        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 24px;
            padding: 14px 20px;
            transition: all 0.2s;
            border-left: 4px solid;
            backdrop-filter: blur(4px);
        }

        /* Different Neon Colors for Each Field */
        .info-neon:nth-child(1) { border-left-color: #ff3b5c; box-shadow: 0 0 6px rgba(255, 59, 92, 0.3); }
        .info-neon:nth-child(2) { border-left-color: #25d366; box-shadow: 0 0 6px rgba(37, 211, 102, 0.3); }
        .info-neon:nth-child(3) { border-left-color: #0ff; box-shadow: 0 0 6px rgba(0, 255, 255, 0.3); }
        .info-neon:nth-child(4) { border-left-color: #ff9500; box-shadow: 0 0 6px rgba(255, 149, 0, 0.3); }
        .info-neon:nth-child(5) { border-left-color: #af52de; box-shadow: 0 0 6px rgba(175, 82, 222, 0.3); }
        .info-neon:nth-child(6) { border-left-color: #ff2d55; box-shadow: 0 0 6px rgba(255, 45, 85, 0.3); }

        .info-neon:hover {
            transform: translateX(6px);
            background: rgba(30, 30, 40, 0.9);
            box-shadow: 0 0 14px rgba(0, 255, 255, 0.2);
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            word-break: break-word;
        }

        /* Footer - Clearly Visible */
        .footer {
            text-align: center;
            margin-top: 36px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 20px;
        }

        /* Contact Admin - Neon Parrot Green */
        .contact-admin {
            text-align: center;
            margin-top: 18px;
        }

        .contact-link {
            color: #39ff14;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.8px;
            background: transparent;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #39ff14;
            transition: 0.25s;
            display: inline-block;
            box-shadow: 0 0 6px rgba(57, 255, 20, 0.3);
        }

        .contact-link:hover {
            background: rgba(57, 255, 20, 0.12);
            box-shadow: 0 0 14px rgba(57, 255, 20, 0.5);
            transform: translateY(-1px);
        }

        /* Modal - Join System */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 36px;
            padding: 44px 32px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 28px rgba(0, 255, 255, 0.2);
        }

        .modal-content h3 {
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 32px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 18px;
        }

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        .cancel-exit {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }

        .verify-real {
            background: rgba(0, 255, 255, 0.15);
            color: #0ff;
            border: 1px solid #0ff;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

<!-- Join Modal -->
<div id="verifyModal" class="modal">
    <div class="modal-content">
        <h3> JOIN WHATSAPP CHANNEL TO CONTINUE</h3>
        <div class="btn-group">
            <button id="joinBtn" class="join-channel">Join Channel</button>
            <button id="cancelBtn" class="cancel-exit">Cancel</button>
        </div>
        <button id="verifyRealBtn" class="verify-real">Verify & Open</button>
    </div>
</div>

<!-- Main Content (Hidden initially) -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>IP Location Finder</h2>
        
        <div class="search-section">
            <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
            <button class="locate-btn" onclick="getIPInfo()">Locate IP</button>
        </div>

        <div class="result" id="result"></div>
        
        <div class="footer">
           TECHNICAL FAHAD 
        </div>

        <!-- Contact Admin - Neon Parrot Green -->
        <div class="contact-admin">
            <a href="https://wa.me/923251138960?text=Assalam%20Alaikum%20FAHAD%20BHAI%20Kese%20Ho%20Aap%20%E2%9D%A3%EF%B8%8F%F0%9F%98%8A" 
               class="contact-link" 
               target="_blank">
                Contact Admin
            </a>
        </div>
    </div>
</div>

<script>
    // Join System (8 seconds hidden)
    let joinClicked = false;
    let timerStarted = false;
    let verifyRealBtn = document.getElementById('verifyRealBtn');
    let joinBtn = document.getElementById('joinBtn');
    let cancelBtn = document.getElementById('cancelBtn');
    let modal = document.getElementById('verifyModal');
    let mainContent = document.getElementById('mainContent');

    joinBtn.onclick = function() {
        if (timerStarted) return;
        window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
        joinClicked = true;
        timerStarted = true;
        
        let secondsPassed = 0;
        let interval = setInterval(function() {
            secondsPassed++;
            if (secondsPassed >= 8) {
                clearInterval(interval);
                if (joinClicked) {
                    verifyRealBtn.style.display = 'inline-block';
                }
                timerStarted = false;
            }
        }, 1000);
    };

    cancelBtn.onclick = function() {
        document.body.innerHTML = '<div style="text-align:center;margin-top:80px;color:white;"><h2>Closed</h2><p>You can close this tab.</p></div>';
    };

    verifyRealBtn.onclick = function() {
        modal.style.display = 'none';
        mainContent.style.display = 'block';
    };

    // IP Info Function
    function getIPInfo() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter an IP address");
            return;
        }

        fetch(`https://ipinfo.io/${ip}/json`)
            .then(response => response.json())
            .then(data => {
                let resultDiv = document.getElementById("result");
                resultDiv.style.display = 'flex';
                resultDiv.innerHTML = `
                    <div class="info-neon"><div class="info-label">🌐 IP ADDRESS</div><div class="info-value">${data.ip}</div></div>
                    <div class="info-neon"><div class="info-label">📍 CITY</div><div class="info-value">${data.city || 'N/A'}</div></div>
                    <div class="info-neon"><div class="info-label">🗺️ REGION</div><div class="info-value">${data.region || 'N/A'}</div></div>
                    <div class="info-neon"><div class="info-label">🏴 COUNTRY</div><div class="info-value">${data.country || 'N/A'}</div></div>
                    <div class="info-neon"><div class="info-label">📌 LOCATION</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                    <div class="info-neon"><div class="info-label">🏢 ORGANIZATION</div><div class="info-value">${data.org || 'N/A'}</div></div>
                `;
            })
            .catch(() => alert("Error fetching data. Try again."));
    }
</script>
</body>
</html>
