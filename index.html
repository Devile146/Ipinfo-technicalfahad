<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder | NeoVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .main-card {
            max-width: 380px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1);
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            color: #fff;
            outline: none;
            margin-bottom: 12px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        .locate-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .result {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 18px;
            padding: 8px 14px;
            border-left: 3px solid;
        }

        .info-neon:nth-child(1) { border-left-color: #ff3b5c; }
        .info-neon:nth-child(2) { border-left-color: #25d366; }
        .info-neon:nth-child(3) { border-left-color: #0ff; }
        .info-neon:nth-child(4) { border-left-color: #ff9500; }
        .info-neon:nth-child(5) { border-left-color: #af52de; }
        .info-neon:nth-child(6) { border-left-color: #ff2d55; }
        .info-neon:nth-child(7) { border-left-color: #ff6b35; }
        .info-neon:nth-child(8) { border-left-color: #9b59b6; }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            word-break: break-word;
        }

        .map-link {
            display: inline-block;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            border-radius: 20px;
            padding: 5px 12px;
            margin-top: 5px;
            margin-right: 8px;
            text-decoration: none;
            color: #0ff;
            font-size: 11px;
            transition: 0.2s;
        }

        .map-link:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .google-maps {
            border-color: #4285f4;
            color: #4285f4;
        }

        .google-earth {
            border-color: #34a853;
            color: #34a853;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 11px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 12px;
        }

        .contact-admin {
            text-align: center;
            margin-top: 12px;
        }

        .contact-link {
            color: #39ff14;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #39ff14;
            display: inline-block;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            width: 300px;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .modal-content h3 {
            color: #fff;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 14px;
        }

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .cancel-exit {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .verify-real {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }

        .loading-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #0ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            z-index: 1100;
            border: 1px solid #0ff;
            pointer-events: none;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #0ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }

        .copy-btn:hover {
            background: rgba(0,255,255,0.3);
        }
    </style>
</head>
<body>

<!-- Join Verification Modal -->
<div id="verifyModal" class="modal">
    <div class="modal-content">
        <h3>🔔 JOIN WHATSAPP CHANNEL TO CONTINUE</h3>
        <div class="btn-group">
            <button id="joinBtn" class="join-channel">📢 Join Channel</button>
            <button id="cancelBtn" class="cancel-exit">✕ Cancel</button>
        </div>
        <button id="verifyRealBtn" class="verify-real">✓ Verify & Open</button>
    </div>
</div>

<!-- Main Application -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>🌍 IP Location Finder</h2>
        
        <div class="search-section">
            <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
            <button class="locate-btn" onclick="getIPInfo()">⟳ Locate IP</button>
        </div>

        <div class="result" id="result"></div>
        
        <div class="footer">
            ⚡ TECHNICAL FAHAD ⚡
        </div>

        <div class="contact-admin">
            <a href="https://wa.me/923251138959?text=Assalam%20Alaikum%20FAHAD%20BHAI%20Kese%20Ho%20Aap%20%E2%9D%A3%EF%B8%8F%F0%9F%98%8A" 
               class="contact-link" 
               target="_blank">
                💚 Contact Admin
            </a>
        </div>
    </div>
</div>

<script>
    // Helper function to copy to clipboard
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast("✅ Link copied!");
        }).catch(() => {
            alert("Press Ctrl+C to copy: " + text);
        });
    }

    // Show toast message
    function showToast(msg) {
        let toast = document.querySelector('.loading-toast');
        if(!toast) {
            toast = document.createElement('div');
            toast.className = 'loading-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // Get IP Location Info with Map Links
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter a valid IP address (e.g., 8.8.8.8)");
            return;
        }
        
        showToast("🔍 Fetching IP location...");
        
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await response.json();
            
            // Extract coordinates
            let lat = null;
            let lon = null;
            let locationText = "N/A";
            
            if (data.loc && data.loc !== "") {
                const coords = data.loc.split(',');
                lat = coords[0];
                lon = coords[1];
                locationText = `${lat}, ${lon}`;
            }
            
            // Generate Google Maps link
            let googleMapsLink = "#";
            let googleEarthLink = "#";
            
            if (lat && lon) {
                // Google Maps link
                googleMapsLink = `https://www.google.com/maps?q=${lat},${lon}&z=12`;
                
                // Google Earth link (web version)
                googleEarthLink = `https://earth.google.com/web/@${lat},${lon},0a,500d`;
            } else if (data.city && data.country) {
                // If no coordinates, search by city name
                const searchQuery = encodeURIComponent(`${data.city}, ${data.country}`);
                googleMapsLink = `https://www.google.com/maps/search/${searchQuery}`;
                googleEarthLink = `https://earth.google.com/web/search/${searchQuery}`;
            }
            
            let resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            
            // Build the HTML with map links
            let mapLinksHTML = '';
            if (lat && lon) {
                mapLinksHTML = `
                    <div style="margin-top: 8px;">
                        <a href="${googleMapsLink}" class="map-link google-maps" target="_blank">🗺️ Open in Google Maps</a>
                        <a href="${googleEarthLink}" class="map-link google-earth" target="_blank">🌍 Open in Google Earth</a>
                    </div>
                    <div style="margin-top: 5px;">
                        <button class="copy-btn" onclick="copyToClipboard('${googleMapsLink}')">📋 Copy Maps Link</button>
                        <button class="copy-btn" onclick="copyToClipboard('${googleEarthLink}')">📋 Copy Earth Link</button>
                    </div>
                `;
            } else {
                mapLinksHTML = `<div style="margin-top: 8px; color: #ff9500;">⚠️ Exact coordinates not available for this IP</div>`;
            }
            
            resultDiv.innerHTML = `
                <div class="info-neon">
                    <div class="info-label">🌐 IP ADDRESS</div>
                    <div class="info-value">${data.ip || ip}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">📍 CITY</div>
                    <div class="info-value">${data.city || 'N/A'}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">🗺️ REGION</div>
                    <div class="info-value">${data.region || 'N/A'}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">🏴 COUNTRY</div>
                    <div class="info-value">${data.country || 'N/A'}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">📌 COORDINATES (LAT/LONG)</div>
                    <div class="info-value">${locationText}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">🏢 ORGANIZATION / ISP</div>
                    <div class="info-value">${data.org || 'N/A'}</div>
                </div>
                <div class="info-neon">
                    <div class="info-label">🗺️ LIVE MAP LOCATION</div>
                    <div class="info-value">
                        ${mapLinksHTML}
                    </div>
                </div>
            `;
            
            showToast("✅ Location found! Check map links below.");
            
        } catch (err) {
            console.error(err);
            alert("Error fetching location data. Check IP or network connection.");
            showToast("❌ Failed to fetch location");
        }
    };

    // Modal Join System
    let joinClicked = false;
    let timerActive = false;
    let verificationInterval = null;

    const modal = document.getElementById('verifyModal');
    const mainContent = document.getElementById('mainContent');
    const joinBtn = document.getElementById('joinBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const verifyRealBtn = document.getElementById('verifyRealBtn');

    joinBtn.onclick = function() {
        if (timerActive) {
            showToast("⏳ Please wait for verification...");
            return;
        }
        window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
        joinClicked = true;
        timerActive = true;
        
        let secondsElapsed = 0;
        verificationInterval = setInterval(function() {
            secondsElapsed++;
            if (secondsElapsed >= 6) {
                clearInterval(verificationInterval);
                if (joinClicked) {
                    verifyRealBtn.style.display = 'inline-block';
                    showToast("✅ Verification ready! Click 'Verify & Open'");
                }
                timerActive = false;
            }
        }, 1000);
    };

    cancelBtn.onclick = function() {
        document.body.innerHTML = '<div style="text-align:center;margin-top:80px;color:white;"><h2 style="color:#ff5555;">⛔ Access Denied</h2><p>Verification cancelled.</p></div>';
    };

    verifyRealBtn.onclick = function() {
        modal.style.display = 'none';
        mainContent.style.display = 'block';
        showToast("✅ Welcome! Enter any IP to find location.");
    };

    // Initialize
    (function initializeApp() {
        verifyRealBtn.style.display = 'none';
        joinClicked = false;
        timerActive = false;
        if(verificationInterval) clearInterval(verificationInterval);
    })();

    // Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && mainContent.style.display === 'block') {
            let ipField = document.getElementById('ipAddress');
            if (ipField && document.activeElement === ipField) {
                getIPInfo();
            }
        }
    });

    window.addEventListener('load', function() {
        if(modal) modal.style.display = 'flex';
    });
</script>
</body>
</html>
