<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder + Logger | NeoVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            padding: 8px;
        }

        /* Main Card */
        .main-card {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1);
        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            color: #fff;
            outline: none;
            margin-bottom: 12px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        .locate-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .result {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 18px;
            padding: 8px 14px;
            border-left: 3px solid;
        }

        .info-neon:nth-child(1) { border-left-color: #ff3b5c; }
        .info-neon:nth-child(2) { border-left-color: #25d366; }
        .info-neon:nth-child(3) { border-left-color: #0ff; }
        .info-neon:nth-child(4) { border-left-color: #ff9500; }
        .info-neon:nth-child(5) { border-left-color: #af52de; }
        .info-neon:nth-child(6) { border-left-color: #ff2d55; }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            word-break: break-word;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 11px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 12px;
        }

        .btn-group-horizontal {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .dashboard-btn {
            flex: 1;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .dashboard-btn:hover {
            background: #27ae60;
        }

        .contact-btn {
            flex: 1;
            background: transparent;
            border: 1px solid #39ff14;
            color: #39ff14;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .contact-btn:hover {
            background: rgba(57, 255, 20, 0.12);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            width: 300px;
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .modal-content h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 14px;
        }

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-exit {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        .verify-real {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #0ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1100;
            border: 1px solid #0ff;
            font-family: monospace;
        }
    </style>
</head>
<body>

<!-- Verification Modal -->
<div id="verifyModal" class="modal">
    <div class="modal-content">
        <h3>🔔 JOIN WHATSAPP CHANNEL TO CONTINUE</h3>
        <div class="modal-buttons">
            <button id="joinBtn" class="join-channel">📢 Join Channel</button>
            <button id="cancelBtn" class="cancel-exit">✕ Cancel</button>
        </div>
        <button id="verifyRealBtn" class="verify-real">✓ Verify & Open</button>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>🌍 IP Location Finder</h2>
        
        <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
        <button class="locate-btn" onclick="getIPInfo()">⟳ Locate IP</button>

        <div class="result" id="result"></div>
        
        <div class="footer">
            ⚡ TECHNICAL FAHAD ⚡
        </div>

        <div class="btn-group-horizontal">
            <button class="dashboard-btn" onclick="openDashboard()">📊 Visitor Dashboard</button>
            <a href="https://wa.me/923251138959?text=Assalam%20Alaikum%20FAHAD%20BHAI" class="contact-btn" target="_blank">💚 Contact Admin</a>
        </div>
    </div>
</div>

<script>
    // ============================================
    // IP LOGGER - HAR VISITOR KI IP SAVE HOGI
    // ============================================
    
    let currentVisitorIP = '';
    
    async function captureVisitor() {
        try {
            const ipRes = await fetch('https://api.ipify.org/?format=json');
            const ipData = await ipRes.json();
            currentVisitorIP = ipData.ip;
            
            const locRes = await fetch(`https://ipapi.co/${currentVisitorIP}/json/`);
            const locData = await locRes.json();
            
            const visitorInfo = {
                ip: currentVisitorIP,
                country: locData.country_name || 'Unknown',
                city: locData.city || 'Unknown',
                region: locData.region || 'Unknown',
                isp: locData.org || 'Unknown',
                device: `${window.screen.width}x${window.screen.height}`,
                browser: navigator.userAgent.substring(0, 80),
                timestamp: new Date().toLocaleString('en-PK', {timeZone: 'Asia/Karachi'})
            };
            
            let logs = JSON.parse(localStorage.getItem('visitorLogs') || '[]');
            const today = new Date().toLocaleDateString();
            const alreadyLogged = logs.find(l => l.ip === currentVisitorIP && l.timestamp.includes(today));
            
            if (!alreadyLogged) {
                logs.push(visitorInfo);
                localStorage.setItem('visitorLogs', JSON.stringify(logs));
            }
            
            return visitorInfo;
        } catch(e) {
            console.error('Capture error:', e);
        }
    }
    
    // Dashboard Window
    function openDashboard() {
        const logs = JSON.parse(localStorage.getItem('visitorLogs') || '[]');
        
        if (logs.length === 0) {
            alert('📭 No visitors recorded yet. Share this link with others!');
            return;
        }
        
        const win = window.open('', '_blank', 'width=1100,height=700,scrollbars=yes');
        win.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Visitor IP Dashboard</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body { font-family: monospace; background: #0a0a0f; color: #0f0; padding: 20px; }
                    h1 { color: #0ff; text-align: center; margin-bottom: 20px; }
                    .stats { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
                    .stat-card { background: #1a1a2e; padding: 15px; border-radius: 10px; border: 1px solid #0ff; text-align: center; min-width: 120px; }
                    .stat-num { font-size: 32px; font-weight: bold; color: #0ff; }
                    table { width: 100%; border-collapse: collapse; background: #1a1a2e; margin-top: 20px; }
                    th, td { border: 1px solid #0f0; padding: 10px; text-align: left; }
                    th { background: #0f0; color: #000; }
                    tr:hover { background: #2a2a3e; }
                    button { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
                    .export { background: #2ecc71; color: white; }
                    .clear { background: #e74c3c; color: white; }
                    .close { background: #e94560; color: white; }
                    @media (max-width: 768px) { td, th { font-size: 10px; padding: 5px; } }
                </style>
            </head>
            <body>
                <h1>📊 VISITOR IP LOGGER DASHBOARD</h1>
                <div class="stats">
                    <div class="stat-card"><div class="stat-num">${logs.length}</div>Total Visitors</div>
                    <div class="stat-card"><div class="stat-num">${new Set(logs.map(l => l.ip)).size}</div>Unique IPs</div>
                    <div class="stat-card"><div class="stat-num">${logs.filter(l => l.timestamp && l.timestamp.includes(new Date().toLocaleDateString())).length}</div>Today</div>
                </div>
                <div>
                    <button class="export" onclick="exportCSV()">📥 Export CSV</button>
                    <button class="clear" onclick="clearAll()">🗑️ Clear All</button>
                    <button class="close" onclick="window.close()">✕ Close</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>#</th><th>Time</th><th>IP</th><th>Country</th><th>City</th><th>ISP</th><th>Device</th></tr></thead>
                        <tbody>
                            ${logs.slice().reverse().map((l, i) => `
                                <tr>
                                    <td>${i+1}</td>
                                    <td>${l.timestamp || 'N/A'}</td>
                                    <td><strong style="color:#0ff">${l.ip}</strong></td>
                                    <td>${l.country}</td>
                                    <td>${l.city}</td>
                                    <td>${(l.isp || '').substring(0, 35)}</td>
                                    <td>${l.device}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <script>
                    const data = ${JSON.stringify(logs)};
                    function exportCSV() {
                        const headers = ['Timestamp','IP','Country','City','Region','ISP','Device','Browser'];
                        const rows = data.map(l => [l.timestamp, l.ip, l.country, l.city, l.region, l.isp, l.device, l.browser]);
                        let csv = headers.join(',') + '\\n' + rows.map(r => r.map(c => '"'+(c||'')+'"').join(',')).join('\\n');
                        const blob = new Blob([csv], {type: 'text/csv'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'visitors_' + Date.now() + '.csv';
                        a.click();
                        URL.revokeObjectURL(url);
                        alert('CSV exported!');
                    }
                    function clearAll() {
                        if(confirm('Delete ALL visitor logs?')) {
                            localStorage.removeItem('visitorLogs');
                            alert('Cleared! Refresh to see changes.');
                            setTimeout(() => window.location.reload(), 1000);
                        }
                    }
                <\/script>
            </body>
            </html>
        `);
    }
    
    // ============================================
    // IP LOCATION FINDER
    // ============================================
    
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter an IP address");
            return;
        }
        
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await response.json();
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            resultDiv.innerHTML = `
                <div class="info-neon"><div class="info-label">🌐 IP</div><div class="info-value">${data.ip || ip}</div></div>
                <div class="info-neon"><div class="info-label">📍 City</div><div class="info-value">${data.city || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🗺️ Region</div><div class="info-value">${data.region || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏴 Country</div><div class="info-value">${data.country || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">📌 Location</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏢 ISP</div><div class="info-value">${data.org || 'N/A'}</div></div>
            `;
        } catch(err) {
            alert("Error: " + err.message);
        }
    };
    
    // ============================================
    // MODAL VERIFICATION (FAST)
    // ============================================
    
    let verifyInterval = null;
    
    const modal = document.getElementById('verifyModal');
    const mainContent = document.getElementById('mainContent');
    const joinBtn = document.getElementById('joinBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const verifyBtn = document.getElementById('verifyRealBtn');
    
    function showToast(msg) {
        let t = document.querySelector('.toast');
        if(!t) {
            t = document.createElement('div');
            t.className = 'toast';
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
    
    joinBtn.onclick = function() {
        window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
        showToast('✅ Channel opened! Wait 3 seconds...');
        
        let seconds = 0;
        verifyInterval = setInterval(() => {
            seconds++;
            if(seconds >= 3) {
                clearInterval(verifyInterval);
                verifyBtn.style.display = 'inline-block';
                showToast('🔓 Verification ready! Click Verify & Open');
            }
        }, 1000);
    };
    
    cancelBtn.onclick = function() {
        document.body.innerHTML = '<div style="text-align:center;margin-top:100px;color:white;"><h2 style="color:#ff5555;">❌ Access Denied</h2><p>Verification cancelled.</p></div>';
    };
    
    verifyBtn.onclick = async function() {
        modal.style.display = 'none';
        mainContent.style.display = 'block';
        showToast('📡 Capturing visitor info...');
        await captureVisitor();
        showToast('✅ Ready! You can search any IP.');
    };
    
    // Initial load
    window.addEventListener('load', () => {
        modal.style.display = 'flex';
        verifyBtn.style.display = 'none';
    });
</script>
</body>
    </html>
